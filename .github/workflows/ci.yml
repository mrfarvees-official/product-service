name: Java CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and Test
        run: mvn clean verify

      - name: SonarCloud Analysis
        run: >
          mvn sonar:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.projectKey=mrfarvees-official_product-service
          -Dsonar.organization=mrfarvees-official
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}